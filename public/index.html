<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poc - Project2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Ganesh Tate</h2>
                <p>Workspace POC</p>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </button>
                <button class="nav-item" data-view="tasks">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path></svg>
                    All Tasks
                </button>
            </nav>
            <button class="add-task-btn" id="btn-add-task">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Task
            </button>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <h1 id="page-title">Dashboard</h1>
                <div class="user-profile">
                    <div class="avatar">GT</div>
                </div>
            </header>

            <!-- Dashboard View -->
            <div id="view-dashboard" class="view-section active">
                <div class="summary-cards">
                    <div class="card stat-card">
                        <h3>Total Tasks</h3>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="card stat-card overdue">
                        <h3>Overdue</h3>
                        <div class="stat-value" id="stat-overdue">0</div>
                    </div>
                    <div class="card stat-card">
                        <h3>In Progress</h3>
                        <div class="stat-value" id="stat-in-progress">0</div>
                    </div>
                    <div class="card stat-card">
                        <h3>Done</h3>
                        <div class="stat-value" id="stat-done">0</div>
                    </div>
                </div>
                
                <div class="dashboard-grid">
                    <div class="card">
                        <h3>Tasks by Category</h3>
                        <div id="chart-category" class="chart-container"></div>
                    </div>
                    <div class="card">
                        <h3>Tasks by Priority</h3>
                        <div id="chart-priority" class="chart-container"></div>
                    </div>
                </div>
            </div>

            <!-- Tasks List View -->
            <div id="view-tasks" class="view-section hidden">
                <div class="filters-bar card glass">
                    <input type="text" id="search-input" placeholder="Search tasks..." class="search-input">
                    <select id="filter-category" class="filter-select">
                        <option value="">All Categories</option>
                        <option value="project">Project</option>
                        <option value="team">Team</option>
                        <option value="client">Client</option>
                        <option value="issue">Issue</option>
                        <option value="hiring">Hiring</option>
                    </select>
                    <select id="filter-status" class="filter-select">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                    <select id="filter-priority" class="filter-select">
                        <option value="">All Priorities</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>

                <div class="tasks-table-container card glass">
                    <table class="tasks-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Project</th>
                                <th>Assigned To</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Due Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-tbody">
                            <!-- Rows rendered via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal card glass">
            <div class="modal-header">
                <h2 id="modal-title">New Task</h2>
                <button class="close-btn" id="btn-close-modal">&times;</button>
            </div>
            <form id="task-form" class="modal-form">
                <input type="hidden" id="form-id">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="form-title" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="form-description" rows="3"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="form-category" required>
                            <option value="project">Project</option>
                            <option value="team">Team</option>
                            <option value="client">Client</option>
                            <option value="issue">Issue</option>
                            <option value="hiring">Hiring</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Project Name</label>
                        <input type="text" id="form-project">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Assigned To</label>
                        <select id="form-assigned"></select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="form-priority">
                            <option value="High">High</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="form-status">
                            <option value="Pending" selected>Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="form-due-date">
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
